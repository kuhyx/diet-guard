publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  flutter_secure_storage: ^10.3.1
  http: ^1.6.0
