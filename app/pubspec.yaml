name: diet_guard_app
description: "Companion phone app for diet_guard: log meals on the go."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  crdt_sync:
    git:
      url: https://github.com/kuhyx/utils
      ref: crdt_sync_dart-v0.3.0
      path: crdt_sync_dart
  crypto: ^3.0.6
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  flutter_secure_storage: ^10.3.1
  http: ^1.6.0
  idb_shim: ^2.9.6+2
  image_picker: ^1.1.2
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  web: ^1.1.1
  workmanager: ^0.9.0+3

dev_dependencies:
  # Generates the Android launcher icons from assets/icon/ (see
  # python_pkg/app_icons in testsAndMisc for the shared style).
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  image_picker_platform_interface: ^2.10.0
  url_launcher_platform_interface: ^2.3.2
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

# Launcher icon generation. Source art is produced by the shared generator:
#   PYTHONPATH=~/testsAndMisc python3 -m python_pkg.app_icons generate --app <key>
# then run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#211D1B"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/icon_monochrome.png"
  min_sdk_android: 21
